services:
  migrate:
    build:
      context: .
      dockerfile: Dockerfile.backend.prod
    image: neko-plugin-market-backend:prod
    env_file:
      - .env.production
    volumes:
      - market_data:/data
    command: alembic upgrade head
    restart: "no"

  backend:
    image: neko-plugin-market-backend:prod
    build:
      context: .
      dockerfile: Dockerfile.backend.prod
    env_file:
      - .env.production
    volumes:
      - market_data:/data
    expose:
      - "8000"
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  frontend:
    build:
      context: ./NEKO_Plugins_Market
      dockerfile: Dockerfile.frontend.prod
      args:
        VITE_API_BASE_URL: /api/v1
    image: neko-plugin-market-frontend:prod
    expose:
      - "80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    env_file:
      - .env.production
    ports:
      - "${MARKET_HTTP_PORT:-80}:80"
      - "${MARKET_HTTPS_PORT:-443}:443"
    volumes:
      - ./Caddyfile.prod:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    restart: unless-stopped

  backup:
    image: neko-plugin-market-backend:prod
    env_file:
      - .env.production
    volumes:
      - market_data:/data:ro
      - market_backups:/backups
    command: python scripts/backup_sqlite.py --output-dir /backups
    profiles:
      - backup
    restart: "no"

volumes:
  market_data:
  market_backups:
  caddy_data:
  caddy_config:
